# GPU Deployment
#
# Use this when your nodes have NVIDIA GPUs available and you want faster AI
# inference and translation. Without this, all AI workloads run on CPU only.
#
# For single-node deployments, pass --gpus all to up.sh instead of applying
# this file manually.
#
ollama:
  resources:
    requests:
      nvidia.com/gpu: 1
    limits:
      nvidia.com/gpu: 1
      cpu: "2"
