# Disable AI Services
#
# Use this when you are not working on AI-related functionality
# (summarization, translation, embeddings) and want to skip deploying
# those services to speed up startup and reduce resource usage.
# Note that any tasks depending on these services will fail.
#
# Pass --disable-ai to up.sh to apply this file automatically.
#
ollama:
  enabled: false
open_webui:
  enabled: false
translate:
  enabled: false
