{{- /* All calculations in MB for consistency with SeaweedFS flags */ -}}
{{- $minFreeSpaceMultiplier := .Values.seaweedfs.volume.minFreeSpaceMultiplier | default 2 -}}
{{- $volumeSizeMB := .Values.seaweedfs.master.volumeSizeLimitMB | int64 -}}
{{- $minFreeSpaceMB := mulf $volumeSizeMB $minFreeSpaceMultiplier | int64 -}}
{{- $pvcStorageBytes := include "SI-to-bytes" .Values.seaweedfs.volume.pvc.storage | int64 -}}
{{- $pvcStorageMB := divf $pvcStorageBytes (mul 1024 1024) | floor | int64 -}}
{{- /* Calculate max volumes: floor((diskSize - minFreeSpace) / volumeSize) */ -}}
{{- $usableSpaceMB := sub $pvcStorageMB $minFreeSpaceMB -}}
{{- $maxVolumes := divf $usableSpaceMB $volumeSizeMB | floor | int64 -}}
{{- /* Ensure at least 1 volume, otherwise fail loudly */ -}}
{{- if le $maxVolumes 0 -}}
  {{- fail (printf "SeaweedFS volume PVC too small: %s provides %dMB, but minFreeSpace=%dMB + 1 volume=%dMB requires at least %dMB" .Values.seaweedfs.volume.pvc.storage $pvcStorageMB $minFreeSpaceMB $volumeSizeMB (add $minFreeSpaceMB $volumeSizeMB)) -}}
{{- end -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "app.fullname" . }}-seaweedfs-volume
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "seaweedfs") | nindent 4 }}
    app.kubernetes.io/component: seaweedfs-volume
spec:
  serviceName: {{ include "app.fullname" . }}-seaweedfs-volume-headless
  replicas: {{ .Values.seaweedfs.volume.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-seaweedfs-volume
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-seaweedfs-volume
        {{- include "app.labels.custom" (dict "context" . "component" "seaweedfs") | nindent 8 }}
    spec:
      affinity:
        podAntiAffinity:
          # Prefer scheduling volume pods on different nodes for better data distribution
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ include "app.name" . }}-seaweedfs-volume
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-master
          image: {{ .Values.image.registry }}/{{ .Values.seaweedfs.initContainer.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.seaweedfs.initContainer.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - 'sh'
            - '-c'
            - |
              set -eu
              until nc -vz {{ include "app.fullname" . }}-seaweedfs-master {{ .Values.seaweedfs.master.port }}; do
                echo "Waiting for SeaweedFS master";
                sleep 2;
              done;
          {{- if .Values.seaweedfs.initContainer.resources }}
          resources: {{- toYaml .Values.seaweedfs.initContainer.resources | nindent 12 }}
          {{- end }}
      containers:
        - name: volume
          image: {{ .Values.image.registry }}/{{ .Values.seaweedfs.volume.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.seaweedfs.volume.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if and .Values.seaweedfs.volume.resources .Values.seaweedfs.volume.resources.limits .Values.seaweedfs.volume.resources.limits.memory }}
            - name: GOMEMLIMIT
              value: "{{ include "gomemlimit" (dict "memory" .Values.seaweedfs.volume.resources.limits.memory "factor" .Values.seaweedfs.goMemoryLimitFactor) }}"
            {{- end }}
          command:
            - weed
            - volume
            - -mserver={{ include "app.fullname" . }}-seaweedfs-master:{{ .Values.seaweedfs.master.port }}
            - -ip=$(POD_NAME).{{ include "app.fullname" . }}-seaweedfs-volume-headless
            - -ip.bind=0.0.0.0
            - -port={{ .Values.seaweedfs.volume.port }}
            - -port.grpc={{ .Values.seaweedfs.volume.grpcPort }}
            - -index=leveldb
            - -dir=/data
            - -max={{ $maxVolumes }}
            - -minFreeSpace={{ $minFreeSpaceMB }}MB
            - -dataCenter={{ include "app.fullname" . }}
            - -rack=$(NODE_NAME)
            - -metricsPort={{ .Values.seaweedfs.volume.metricsPort }}
          ports:
            - name: volume
              containerPort: {{ .Values.seaweedfs.volume.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.seaweedfs.volume.grpcPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.seaweedfs.volume.metricsPort }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /status
              port: {{ .Values.seaweedfs.volume.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /status
              port: {{ .Values.seaweedfs.volume.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          {{- if .Values.seaweedfs.volume.resources }}
          resources: {{- toYaml .Values.seaweedfs.volume.resources | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.seaweedfs.volume.pvc.storageClass }}
        storageClassName: {{ .Values.seaweedfs.volume.pvc.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.seaweedfs.volume.pvc.storage }}
