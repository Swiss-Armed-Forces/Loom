apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "app.fullname" . }}-dovecot
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "dovecot") | nindent 4 }}
    app.kubernetes.io/component: dovecot
  {{- with include "app.annotations.custom" (dict "context" . "component" "dovecot") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "app.fullname" . }}-dovecot
  replicas: {{ .Values.dovecot.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-dovecot
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-dovecot
        {{- include "app.labels.custom" (dict "context" . "component" "dovecot") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "dovecot") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.dovecot.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-perms
          image: {{ .Values.image.registry }}/{{ .Values.dovecot.initContainer.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.dovecot.initContainer.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - 'sh'
            - '-c'
            - |
              chown 0:1000 /srv/mail;
              chmod 0775 /srv/mail;
          volumeMounts:
            - mountPath: /srv/mail
              name: dovecot
          {{- if .Values.dovecot.initContainer.resources }}
          resources: {{- toYaml .Values.dovecot.initContainer.resources | nindent 12 }}
          {{- end }}
      containers:
        - name: dovecot
          image: {{ .Values.image.registry }}/{{ .Values.dovecot.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.dovecot.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: imap
              containerPort: {{ .Values.dovecot.service.port.imap }}
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: imap
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          {{- if .Values.dovecot.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: imap
            initialDelaySeconds: {{ default 0 .Values.dovecot.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 30 .Values.dovecot.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.dovecot.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 5 .Values.dovecot.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.dovecot.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: imap
            initialDelaySeconds: {{ default 0 .Values.dovecot.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 10 .Values.dovecot.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.dovecot.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 .Values.dovecot.readinessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - mountPath: /srv/mail
              name: dovecot
          {{- if .Values.dovecot.resources }}
          resources: {{- toYaml .Values.dovecot.resources | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: dovecot
        {{- with include "app.pvc.labels.custom" (dict "context" . "component" "dovecot") }}
        labels:
          {{- . | nindent 10 }}
        {{- end }}
        {{- with include "app.pvc.annotations.custom" (dict "context" . "component" "dovecot") }}
        annotations:
          {{- . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.dovecot.pvc.accessModes | default "ReadWriteOnce" | quote }}
        resources:
            requests:
              storage: {{ .Values.dovecot.pvc.storage }}
        {{- if .Values.dovecot.pvc.storageClass }}
        storageClassName: {{ .Values.dovecot.pvc.storageClass }}
        {{- end }}
