apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-mongodb
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "mongodb") | nindent 4 }}
    app.kubernetes.io/component: mongodb
  {{- with include "app.annotations.custom" (dict "context" . "component" "mongodb") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - port: {{ .Values.mongodb.service.port }}
      name: mongodb
      targetPort: {{ .Values.mongodb.service.port }}
    {{- if .Values.mongodb.exporter.enabled }}
    - port: {{ .Values.mongodb.exporter.port }}
      name: metrics
      targetPort: {{ .Values.mongodb.exporter.port }}
    {{- end }}
  selector:
    app: {{ include "app.name" . }}-mongodb
