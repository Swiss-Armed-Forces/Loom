{{- if and .Values.open_webui.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "app.fullname" . }}-open-webui
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "openWebui") | nindent 4 }}
    app.kubernetes.io/component: ollama
  {{- with include "app.annotations.custom" (dict "context" . "component" "openWebui") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.open_webui.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-open-webui
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-open-webui
        {{- include "app.labels.custom" (dict "context" . "component" "openWebui") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "openWebui") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.open_webui.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      containers:
        - name: open-webui
          image: {{ .Values.image.registry }}/{{ .Values.open_webui.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.open_webui.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: openwebui
              containerPort: {{ .Values.open_webui.service.port }}
          env:
            {{- if .Values.ollama.enabled }}
            - name: OLLAMA_BASE_URL
              value: http://{{ include "app.fullname" . }}-ollama:{{ .Values.ollama.service.port }}
            {{- else }}
            - name: ENABLE_OLLAMA_API
              value: "false"
            {{- end }}
            {{- if .Values.llm.chat.endpoint }}
            - name: OPENAI_API_BASE_URL
              value: {{ .Values.llm.chat.endpoint | quote }}
            {{- if .Values.llm.chat.api_key }}
            - name: OPENAI_API_KEY
              value: {{ .Values.llm.chat.api_key | quote }}
            {{- end }}
            {{- else }}
            - name: ENABLE_OPENAI_API
              value: "false"
            {{- end }}
            - name: ENV
              value: {{ .Values.open_webui.env.ENV | quote }}
            - name: WEBUI_URL
              value: "http://localhost:{{ .Values.open_webui.service.port }}"
            - name: WEBUI_AUTH
              value: {{ .Values.open_webui.env.WEBUI_AUTH | quote }}
            - name: WEBUI_NAME
              value: "{{ include "app.name" . }}-open-webui"
            - name: ENABLE_SIGNUP
              value: {{ .Values.open_webui.env.ENABLE_SIGNUP | quote }}
            - name: DEFAULT_MODELS
              value: {{ .Values.llm.chat.model | quote }}
            - name: USER_PERMISSIONS_CHAT_TEMPORARY_ENFORCED
              value: {{ .Values.open_webui.env.USER_PERMISSIONS_CHAT_TEMPORARY_ENFORCED | quote }}
            - name: TOOL_SERVER_CONNECTIONS
              value: |
                [
                  {
                      "url": "http://{{ include "app.fullname" . }}-api:{{ .Values.api.service.port }}/v1/aitools",
                      "path": "openapi.json",
                      "auth_type": "bearer",
                      "key": "",
                      "config": { "enable": true, "access_control": null },
                      "info": { "name": "Loom-Api", "description": "" }
                  }
                ]
            - name: OFFLINE_MODE
              value: {{ .Values.open_webui.env.OFFLINE_MODE | quote }}
            - name: HF_HUB_OFFLINE
              value: {{ .Values.open_webui.env.HF_HUB_OFFLINE | quote }}
            - name: RAG_EMBEDDING_MODEL_AUTO_UPDATE
              value: {{ .Values.open_webui.env.RAG_EMBEDDING_MODEL_AUTO_UPDATE | quote }}
            - name: RAG_RERANKING_MODEL_AUTO_UPDATE
              value: {{ .Values.open_webui.env.RAG_RERANKING_MODEL_AUTO_UPDATE | quote }}
            - name: WHISPER_MODEL_AUTO_UPDATE
              value: {{ .Values.open_webui.env.WHISPER_MODEL_AUTO_UPDATE | quote }}
          volumeMounts:
            - mountPath: /app/backend/data
              name: open-webui
          {{- if .Values.open_webui.resources }}
          resources: {{- toYaml .Values.open_webui.resources | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: open-webui
        {{- with include "app.pvc.labels.custom" (dict "context" . "component" "open_webui") }}
        labels:
          {{- . | nindent 10 }}
        {{- end }}
        {{- with include "app.pvc.annotations.custom" (dict "context" . "component" "open_webui") }}
        annotations:
          {{- . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.open_webui.pvc.accessModes | default "ReadWriteOnce" | quote }}
        resources:
            requests:
              storage: {{ .Values.open_webui.pvc.storage }}
        {{- if .Values.open_webui.pvc.storageClass }}
        storageClassName: {{ .Values.open_webui.pvc.storageClass }}
        {{- end }}
{{- end }}
