{{- define "app.worker.deployment" -}}
{{- $component := .component -}}
{{- $values := index .Values $component -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-{{ $component }}
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" $component) | nindent 4 }}
    app.kubernetes.io/component: "{{ $component }}"
  {{- with include "app.annotations.custom" (dict "context" . "component" $component) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not $values.hpa.enabled }}
  replicas: {{ $values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ $values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ $values.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-{{ $component }}
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-{{ $component }}
        {{- include "app.labels.custom" (dict "context" . "component" $component) | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" $component) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $values.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with include "app.trustedCerts.initContainer" . }}
      initContainers:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $component }}
          image: {{ .Values.image.registry }}/{{ $values.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) $values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ $component }}
              containerPort: {{ $values.service.port }}
          env:
            - name: WORKER_TYPE
              value: {{ $component | upper | quote }}
            - name: archive_enc_master_key
              valueFrom:
                secretKeyRef:
                  name: archive-enc-master-key
                  key: secretkey
          envFrom:
            - configMapRef:
                name: {{ include "app.fullname" . }}-settings
            {{- with include "app.externalSecrets.envFrom" . }}{{ . | nindent 12 }}{{- end }}
          {{- if $values.command }}
          command: {{- toYaml $values.command | nindent 10 }}
          {{- else }}
          command:
            - "python"
            - "main.py"
            - "worker"
            - "--loglevel"
            - "INFO"
          {{- end }}
          {{- if $values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - WORKER_TYPE=INSPECT python main.py inspect ping --timeout {{ sub (default 45 $values.readinessProbe.timeoutSeconds) 10 }} --destination "celery@${HOSTNAME}"
            initialDelaySeconds: {{ default 10 $values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 120 $values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 45 $values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 6 $values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if $values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - WORKER_TYPE=INSPECT python main.py inspect ping --timeout {{ sub (default 45 $values.livenessProbe.timeoutSeconds) 10 }} --destination "celery@${HOSTNAME}"
            initialDelaySeconds: {{ default 10 $values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 120 $values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 45 $values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 6 $values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if $values.resources }}
          resources: {{- toYaml $values.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: imagemagick-policy
              mountPath: /etc/ImageMagick-6/policy.xml
              subPath: policy.xml
            {{- with include "app.trustedCerts.volumeMount" . }}{{ . | nindent 12 }}{{- end }}
      volumes:
        - name: imagemagick-policy
          configMap:
            name: {{ include "app.fullname" . }}-imagemagick-policy
        {{- with include "app.trustedCerts.volumes" . }}{{ . | nindent 8 }}{{- end }}
{{- end -}}
