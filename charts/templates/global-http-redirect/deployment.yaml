{{- if .Values.globalHttpRedirect.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-global-http-redirect
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "globalHttpRedirect") | nindent 4 }}
    app.kubernetes.io/component: "global-http-redirect"
  {{- with include "app.annotations.custom" (dict "context" . "component" "globalHttpRedirect") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.globalHttpRedirect.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-global-http-redirect
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-global-http-redirect
        {{- include "app.labels.custom" (dict "context" . "component" "globalHttpRedirect") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "globalHttpRedirect") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.globalHttpRedirect.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with include "app.trustedCerts.initContainer" . }}
      initContainers:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: global-http-redirect
          image: {{ .Values.image.registry }}/{{ .Values.globalHttpRedirect.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.globalHttpRedirect.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              echo "[*] Sleeping.."
              sleep infinity
          ports:
            - containerPort: {{ .Values.globalHttpRedirect.service.port }}
          {{- if .Values.globalHttpRedirect.resources }}
          resources: {{- toYaml .Values.globalHttpRedirect.resources | nindent 12 }}
          {{- end }}
          {{- with include "app.trustedCerts.volumeMount" . }}
          volumeMounts:
            {{- . | nindent 12 }}
          {{- end }}
      {{- with include "app.trustedCerts.volumes" . }}
      volumes:
        {{- . | nindent 8 }}
      {{- end }}
{{- end }}
