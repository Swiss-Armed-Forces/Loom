apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-settings
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "") | nindent 4 }}
    app.kubernetes.io/component: monitoring
  {{- with include "app.annotations.custom" (dict "context" . "component" "") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
    # NOTE: Using Helm conditionals to prevent keys with null/empty values from being included
    # in the ConfigMap. This is a workaround for an ArgoCD bug where null values in YAML
    # get converted to empty strings, causing the application to remain perpetually OutOfSync.
    #
    # Bug details: https://github.com/argoproj/argo-cd/issues/15566
    # - ArgoCD converts null values to empty strings during processing
    # - This causes a diff between desired state (null) and live state (key removed)
    # - The conditional approach ensures keys are only included when they have actual values
    #
    # Using 'ne ... nil' to exclude null values while including false booleans and zero values

    ENVIRONMENT: {{ .Values.environment }}
    DOMAIN: {{ .Values.domain }}

    # pipeline
    {{- if ne .Values.pipeline.task_time_limit_seconds nil }}
    task_time_limit_seconds: {{ .Values.pipeline.task_time_limit_seconds | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.uploaded_files_days_before_hidden nil }}
    uploaded_files_days_before_hidden: {{ .Values.pipeline.uploaded_files_days_before_hidden | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.lazy_threshold_bytes nil }}
    lazy_threshold_bytes: {{ .Values.pipeline.lazy_threshold_bytes | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.imap_folder_days_before_unsubscribe nil }}
    imap_folder_days_before_unsubscribe: {{ .Values.pipeline.imap_folder_days_before_unsubscribe | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.reindex_lost_files_max_files nil }}
    reindex_lost_files_max_files: {{ .Values.pipeline.reindex_lost_files_max_files | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.max_reindex_count nil }}
    max_reindex_count: {{ .Values.pipeline.max_reindex_count | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.skip_summarize_while_indexing nil }}
    skip_summarize_while_indexing: {{ .Values.pipeline.skip_summarize_while_indexing | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.skip_image_description_while_indexing nil }}
    skip_image_description_while_indexing: {{ .Values.pipeline.skip_image_description_while_indexing | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.skip_translate_while_indexing nil }}
    skip_translate_while_indexing: {{ .Values.pipeline.skip_translate_while_indexing | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.skip_embedding_while_indexing nil }}
    skip_embedding_while_indexing: {{ .Values.pipeline.skip_embedding_while_indexing | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.skip_auto_tag_file_while_indexing nil }}
    skip_auto_tag_file_while_indexing: {{ .Values.pipeline.skip_auto_tag_file_while_indexing | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.auto_tag_file_similarity_threshold nil }}
    auto_tag_file_similarity_threshold: {{ .Values.pipeline.auto_tag_file_similarity_threshold | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.throttle_max_lazybytes__bytes nil }}
    throttle_max_lazybytes__bytes: {{ .Values.pipeline.throttle_max_lazybytes__bytes | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.max_recursion_depth nil }}
    max_recursion_depth: {{ .Values.pipeline.max_recursion_depth | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.tika_ocr_languages nil }}
    tika_ocr_languages: {{ .Values.pipeline.tika_ocr_languages | join "," | quote }}
    {{- end }}
    tika_timeout_seconds: {{ .Values.tika.taskTimeoutSeconds | quote }}
    {{- if ne .Values.pipeline.imagemagick_timeout_seconds nil }}
    imagemagick_timeout_seconds: {{ .Values.pipeline.imagemagick_timeout_seconds | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_queue_name_prefix nil }}
    celery_queue_name_prefix: {{ .Values.pipeline.celery_queue_name_prefix | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_deliver_limit nil }}
    celery_deliver_limit: {{ .Values.pipeline.celery_deliver_limit | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_graveyard_deliver_limit nil }}
    celery_graveyard_deliver_limit: {{ .Values.pipeline.celery_graveyard_deliver_limit | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_graveyard_task_name nil }}
    celery_graveyard_task_name: {{ .Values.pipeline.celery_graveyard_task_name | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_dead_task_name nil }}
    celery_dead_task_name: {{ .Values.pipeline.celery_dead_task_name | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_dead_deliver_limit nil }}
    celery_dead_deliver_limit: {{ .Values.pipeline.celery_dead_deliver_limit | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_abyss_task_name nil }}
    celery_abyss_task_name: {{ .Values.pipeline.celery_abyss_task_name | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_abyss_ttl__seconds nil }}
    celery_abyss_ttl__seconds: {{ .Values.pipeline.celery_abyss_ttl__seconds | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_persister_shard_prefix nil }}
    celery_persister_shard_prefix: {{ .Values.pipeline.celery_persister_shard_prefix | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_unroutable_ttl__seconds nil }}
    celery_unroutable_ttl__seconds: {{ .Values.pipeline.celery_unroutable_ttl__seconds | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_unroutable_task_name nil }}
    celery_unroutable_task_name: {{ .Values.pipeline.celery_unroutable_task_name | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_default_exchange_name nil }}
    celery_default_exchange_name: {{ .Values.pipeline.celery_default_exchange_name | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_default_exchange_type nil }}
    celery_default_exchange_type: {{ .Values.pipeline.celery_default_exchange_type | quote }}
    {{- end }}
    {{- if ne .Values.pipeline.celery_alternate_exchange_name nil }}
    celery_alternate_exchange_name: {{ .Values.pipeline.celery_alternate_exchange_name | quote }}
    {{- end }}


    # worker concurrency
    {{- if ne .Values.worker.minConcurrency nil }}
    worker_min_concurrency: {{ .Values.worker.minConcurrency | quote }}
    {{- end }}
    {{- if ne .Values.worker.maxConcurrency nil }}
    worker_max_concurrency: {{ .Values.worker.maxConcurrency | quote }}
    {{- end }}

    # persister sharding
    {{- if ne .Values.persister.sharding.numShards nil }}
    num_persister_shards: {{ .Values.persister.sharding.numShards | quote }}
    {{- end }}
    persister_total: {{ .Values.persister.replicaCount | quote }}

    # memory watermark
    {{- if ne .Values.persister.memoryWatermarkPercent nil }}
    memory_watermark_percent: {{ .Values.persister.memoryWatermarkPercent | quote }}
    {{- end }}

    # persister timing
    {{- if ne .Values.persister.debounceWindow nil }}
    persister_debounce_window: {{ .Values.persister.debounceWindow | quote }}
    {{- end }}
    {{- if ne .Values.persister.maxDelay nil }}
    persister_max_delay: {{ .Values.persister.maxDelay | quote }}
    {{- end }}
    {{- if ne .Values.persister.maxDelayForgetMultiplier nil }}
    persister_max_delay_forget_multiplier: {{ .Values.persister.maxDelayForgetMultiplier | quote }}
    {{- end }}
    {{- if ne .Values.persister.saveMaxRetries nil }}
    persister_save_max_retries: {{ .Values.persister.saveMaxRetries | quote }}
    {{- end }}

    # elasticsearch
    {{- if ne .Values.elasticsearch.shardsCount nil }}
    es_number_of_shards: {{ .Values.elasticsearch.shardsCount | quote  }}
    {{- end }}
    {{- if ne .Values.elasticsearch.shardsReplicasCount nil }}
    es_number_of_replicas: {{ .Values.elasticsearch.shardsReplicasCount | quote  }}
    {{- end }}
    {{- if ne .Values.esInit.recreateSchema nil }}
    es_recreate_schema: {{ .Values.esInit.recreateSchema | quote }}
    {{- end }}

    # translate
    {{- if ne .Values.translate.timeout nil }}
    translate_timeout: {{ .Values.translate.timeout | quote }}
    {{- end }}

    # hosts
    es_host: http://{{ include "app.fullname" . }}-elasticsearch:{{ .Values.elasticsearch.service.port }}
    rabbit_mq_management_host: http://guest:guest@{{ include "app.fullname" . }}-rabbit:{{ .Values.rabbit.service.port.http }}
    celery_broker_host: amqp://{{ include "app.fullname" . }}-rabbit:{{ .Values.rabbit.service.port.amqp }}
    celery_backend_host: redis://{{ include "app.fullname" . }}-redis:{{ .Values.redis.service.port }}/0?protocol=3
    redis_cache_host: redis://{{ include "app.fullname" . }}-redis-cache:{{ index .Values "redis-cache" "service" "port" }}/0?protocol=3
    tika_server_host: http://{{ include "app.fullname" . }}-tika:{{ .Values.tika.service.port }}
    rspam_host: http://{{ include "app.fullname" . }}-rspamd:{{ .Values.rspamd.worker.service.port }}
    translate_host: http://{{ .Values.translate.service.externalHost | default (printf "%s-translate" (include "app.fullname" .)) }}:{{ .Values.translate.service.port }}

    api_host: http://{{ include "app.fullname" . }}-api:{{ .Values.api.service.port }}
    ws_host: ws://{{ include "app.fullname" . }}-api:{{ .Values.api.service.port }}
    imap_host: imap://{{ include "app.fullname" . }}-dovecot:{{ .Values.dovecot.service.port.imap }}
    s3_host: &s3-host {{ include "app.fullname" . }}-seaweedfs-filer:{{ .Values.seaweedfs.s3.port }}
    roundcube_host: http://{{ include "app.fullname" . }}-roundcube:{{ .Values.roundcube.service.port }}
    gotenberg_host: http://{{ include "app.fullname" . }}-gotenberg:{{ .Values.gotenberg.service.port }}
    seaweedfs_master_host: http://{{ include "app.fullname" . }}-seaweedfs-master:{{ .Values.seaweedfs.master.port }}

    # file storage
    file_storage__host: {{ .Values.fileStorage.s3Storage.host | default (printf "%s-seaweedfs-filer:%s" (include "app.fullname" .) (.Values.seaweedfs.s3.port | toString)) | quote }}
    {{- if ne .Values.fileStorage.s3Storage.bucketName nil }}
    file_storage__bucket_name: {{ .Values.fileStorage.s3Storage.bucketName | quote }}
    {{- end }}
    {{- if and (not .Values.externalSecrets.secrets.file_storage__access_key.enabled) (ne .Values.fileStorage.s3Storage.accessKey nil) }}
    file_storage__access_key: {{ .Values.fileStorage.s3Storage.accessKey | quote }}
    {{- end }}
    {{- if and (not .Values.externalSecrets.secrets.file_storage__secret_key.enabled) (ne .Values.fileStorage.s3Storage.secretKey nil) }}
    file_storage__secret_key: {{ .Values.fileStorage.s3Storage.secretKey | quote }}
    {{- end }}
    {{- if ne .Values.fileStorage.s3Storage.secureConnection nil }}
    file_storage__secure_connection: {{ .Values.fileStorage.s3Storage.secureConnection | quote }}
    {{- end }}
    {{- if ne .Values.fileStorage.s3Storage.connectionPoolSize nil }}
    file_storage__connection_pool_size: {{ .Values.fileStorage.s3Storage.connectionPoolSize | quote }}
    {{- end }}

    # lazybytes storage
    lazybytes_storage__host: {{ .Values.lazyBytes.s3Storage.host | default (printf "%s-seaweedfs-filer:%s" (include "app.fullname" .) (.Values.seaweedfs.s3.port | toString)) | quote }}
    {{- if ne .Values.lazyBytes.s3Storage.bucketName nil }}
    lazybytes_storage__bucket_name: {{ .Values.lazyBytes.s3Storage.bucketName | quote }}
    {{- end }}
    {{- if and (not .Values.externalSecrets.secrets.lazybytes_storage__access_key.enabled) (ne .Values.lazyBytes.s3Storage.accessKey nil) }}
    lazybytes_storage__access_key: {{ .Values.lazyBytes.s3Storage.accessKey | quote }}
    {{- end }}
    {{- if and (not .Values.externalSecrets.secrets.lazybytes_storage__secret_key.enabled) (ne .Values.lazyBytes.s3Storage.secretKey nil) }}
    lazybytes_storage__secret_key: {{ .Values.lazyBytes.s3Storage.secretKey | quote }}
    {{- end }}
    {{- if ne .Values.lazyBytes.s3Storage.secureConnection nil }}
    lazybytes_storage__secure_connection: {{ .Values.lazyBytes.s3Storage.secureConnection | quote }}
    {{- end }}
    {{- if ne .Values.lazyBytes.s3Storage.connectionPoolSize nil }}
    lazybytes_storage__connection_pool_size: {{ .Values.lazyBytes.s3Storage.connectionPoolSize | quote }}
    {{- end }}

    # intake storage
    intake_storage__host: {{ .Values.intakeStorage.s3Storage.host | default (printf "%s-seaweedfs-filer:%s" (include "app.fullname" .) (.Values.seaweedfs.s3.port | toString)) | quote }}
    {{- if ne .Values.intakeStorage.s3Storage.bucketName nil }}
    intake_storage__bucket_name: {{ .Values.intakeStorage.s3Storage.bucketName | quote }}
    {{- end }}
    {{- if and (not .Values.externalSecrets.secrets.intake_storage__access_key.enabled) (ne .Values.intakeStorage.s3Storage.accessKey nil) }}
    intake_storage__access_key: {{ .Values.intakeStorage.s3Storage.accessKey | quote }}
    {{- end }}
    {{- if and (not .Values.externalSecrets.secrets.intake_storage__secret_key.enabled) (ne .Values.intakeStorage.s3Storage.secretKey nil) }}
    intake_storage__secret_key: {{ .Values.intakeStorage.s3Storage.secretKey | quote }}
    {{- end }}
    {{- if ne .Values.intakeStorage.s3Storage.secureConnection nil }}
    intake_storage__secure_connection: {{ .Values.intakeStorage.s3Storage.secureConnection | quote }}
    {{- end }}
    {{- if ne .Values.intakeStorage.s3Storage.connectionPoolSize nil }}
    intake_storage__connection_pool_size: {{ .Values.intakeStorage.s3Storage.connectionPoolSize | quote }}
    {{- end }}

    {{- $ollamaEndpoint := printf "http://%s-ollama:%s/v1/" (include "app.fullname" .) (.Values.ollama.service.port | toString) }}

    # llm embedding
    llm__embedding__endpoint: {{ .Values.llm.embedding.endpoint | default $ollamaEndpoint | quote }}
    {{- if and (not .Values.externalSecrets.secrets.llm__embedding__api_key.enabled) (ne .Values.llm.embedding.api_key nil) }}
    llm__embedding__api_key: {{ .Values.llm.embedding.api_key | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.model nil }}
    llm__embedding__model: {{ .Values.llm.embedding.model | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.temperature nil }}
    llm__embedding__temperature: {{ .Values.llm.embedding.temperature | quote }}
    {{- end }}
    {{- if .Values.llm.embedding.extra_headers }}
    llm__embedding__extra_headers: {{ .Values.llm.embedding.extra_headers | toJson | quote }}
    {{- end }}
    {{- if .Values.llm.embedding.extra_body }}
    llm__embedding__extra_body: {{ .Values.llm.embedding.extra_body | toJson | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.timeout nil }}
    llm__embedding__timeout: {{ .Values.llm.embedding.timeout | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.dimensions nil }}
    llm__embedding__dimensions: {{ .Values.llm.embedding.dimensions | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.text_chunk_size nil }}
    llm__embedding__text_chunk_size: {{ .Values.llm.embedding.text_chunk_size | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.text_chunk_overlap nil }}
    llm__embedding__text_chunk_overlap: {{ .Values.llm.embedding.text_chunk_overlap | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.document_prefix nil }}
    llm__embedding__document_prefix: {{ .Values.llm.embedding.document_prefix | quote }}
    {{- end }}
    {{- if ne .Values.llm.embedding.query_prefix nil }}
    llm__embedding__query_prefix: {{ .Values.llm.embedding.query_prefix | quote }}
    {{- end }}

    # llm tool
    llm__tool__endpoint: {{ .Values.llm.tool.endpoint | default $ollamaEndpoint | quote }}
    {{- if and (not .Values.externalSecrets.secrets.llm__tool__api_key.enabled) (ne .Values.llm.tool.api_key nil) }}
    llm__tool__api_key: {{ .Values.llm.tool.api_key | quote }}
    {{- end }}
    {{- if ne .Values.llm.tool.model nil }}
    llm__tool__model: {{ .Values.llm.tool.model | quote }}
    {{- end }}
    {{- if ne .Values.llm.tool.temperature nil }}
    llm__tool__temperature: {{ .Values.llm.tool.temperature | quote }}
    {{- end }}
    {{- if .Values.llm.tool.extra_headers }}
    llm__tool__extra_headers: {{ .Values.llm.tool.extra_headers | toJson | quote }}
    {{- end }}
    {{- if .Values.llm.tool.extra_body }}
    llm__tool__extra_body: {{ .Values.llm.tool.extra_body | toJson | quote }}
    {{- end }}
    {{- if ne .Values.llm.tool.timeout nil }}
    llm__tool__timeout: {{ .Values.llm.tool.timeout | quote }}
    {{- end }}
    {{- if ne .Values.llm.tool.max_tokens nil }}
    llm__tool__max_tokens: {{ .Values.llm.tool.max_tokens | quote }}
    {{- end }}

    # llm summarization key points
    llm__summarization_key_points__endpoint: {{ .Values.llm.summarization_key_points.endpoint | default $ollamaEndpoint | quote }}
    {{- if and (not .Values.externalSecrets.secrets.llm__summarization_key_points__api_key.enabled) (ne .Values.llm.summarization_key_points.api_key nil) }}
    llm__summarization_key_points__api_key: {{ .Values.llm.summarization_key_points.api_key | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.model nil }}
    llm__summarization_key_points__model: {{ .Values.llm.summarization_key_points.model | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.temperature nil }}
    llm__summarization_key_points__temperature: {{ .Values.llm.summarization_key_points.temperature | quote }}
    {{- end }}
    {{- if .Values.llm.summarization_key_points.extra_headers }}
    llm__summarization_key_points__extra_headers: {{ .Values.llm.summarization_key_points.extra_headers | toJson | quote }}
    {{- end }}
    {{- if .Values.llm.summarization_key_points.extra_body }}
    llm__summarization_key_points__extra_body: {{ .Values.llm.summarization_key_points.extra_body | toJson | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.timeout nil }}
    llm__summarization_key_points__timeout: {{ .Values.llm.summarization_key_points.timeout | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.text_chunk_size nil }}
    llm__summarization_key_points__text_chunk_size: {{ .Values.llm.summarization_key_points.text_chunk_size | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.text_chunk_overlap nil }}
    llm__summarization_key_points__text_chunk_overlap: {{ .Values.llm.summarization_key_points.text_chunk_overlap | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.system_prompt nil }}
    llm__summarization_key_points__system_prompt: {{ .Values.llm.summarization_key_points.system_prompt | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_key_points.max_tokens nil }}
    llm__summarization_key_points__max_tokens: {{ .Values.llm.summarization_key_points.max_tokens | quote }}
    {{- end }}

    # llm summarization
    llm__summarization__endpoint: {{ .Values.llm.summarization.endpoint | default $ollamaEndpoint | quote }}
    {{- if and (not .Values.externalSecrets.secrets.llm__summarization__api_key.enabled) (ne .Values.llm.summarization.api_key nil) }}
    llm__summarization__api_key: {{ .Values.llm.summarization.api_key | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization.model nil }}
    llm__summarization__model: {{ .Values.llm.summarization.model | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization.temperature nil }}
    llm__summarization__temperature: {{ .Values.llm.summarization.temperature | quote }}
    {{- end }}
    {{- if .Values.llm.summarization.extra_headers }}
    llm__summarization__extra_headers: {{ .Values.llm.summarization.extra_headers | toJson | quote }}
    {{- end }}
    {{- if .Values.llm.summarization.extra_body }}
    llm__summarization__extra_body: {{ .Values.llm.summarization.extra_body | toJson | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization.timeout nil }}
    llm__summarization__timeout: {{ .Values.llm.summarization.timeout | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization.system_prompt nil }}
    llm__summarization__system_prompt: {{ .Values.llm.summarization.system_prompt | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization.max_tokens nil }}
    llm__summarization__max_tokens: {{ .Values.llm.summarization.max_tokens | quote }}
    {{- end }}

    # llm summarization refine
    llm__summarization_refine__endpoint: {{ .Values.llm.summarization_refine.endpoint | default $ollamaEndpoint | quote }}
    {{- if and (not .Values.externalSecrets.secrets.llm__summarization_refine__api_key.enabled) (ne .Values.llm.summarization_refine.api_key nil) }}
    llm__summarization_refine__api_key: {{ .Values.llm.summarization_refine.api_key | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_refine.model nil }}
    llm__summarization_refine__model: {{ .Values.llm.summarization_refine.model | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_refine.temperature nil }}
    llm__summarization_refine__temperature: {{ .Values.llm.summarization_refine.temperature | quote }}
    {{- end }}
    {{- if .Values.llm.summarization_refine.extra_headers }}
    llm__summarization_refine__extra_headers: {{ .Values.llm.summarization_refine.extra_headers | toJson | quote }}
    {{- end }}
    {{- if .Values.llm.summarization_refine.extra_body }}
    llm__summarization_refine__extra_body: {{ .Values.llm.summarization_refine.extra_body | toJson | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_refine.timeout nil }}
    llm__summarization_refine__timeout: {{ .Values.llm.summarization_refine.timeout | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_refine.system_prompt nil }}
    llm__summarization_refine__system_prompt: {{ .Values.llm.summarization_refine.system_prompt | quote }}
    {{- end }}
    {{- if ne .Values.llm.summarization_refine.max_tokens nil }}
    llm__summarization_refine__max_tokens: {{ .Values.llm.summarization_refine.max_tokens | quote }}
    {{- end }}

    # llm hyde
    llm__hyde__endpoint: {{ .Values.llm.hyde.endpoint | default $ollamaEndpoint | quote }}
    {{- if and (not .Values.externalSecrets.secrets.llm__hyde__api_key.enabled) (ne .Values.llm.hyde.api_key nil) }}
    llm__hyde__api_key: {{ .Values.llm.hyde.api_key | quote }}
    {{- end }}
    {{- if ne .Values.llm.hyde.model nil }}
    llm__hyde__model: {{ .Values.llm.hyde.model | quote }}
    {{- end }}
    {{- if ne .Values.llm.hyde.temperature nil }}
    llm__hyde__temperature: {{ .Values.llm.hyde.temperature | quote }}
    {{- end }}
    {{- if .Values.llm.hyde.extra_headers }}
    llm__hyde__extra_headers: {{ .Values.llm.hyde.extra_headers | toJson | quote }}
    {{- end }}
