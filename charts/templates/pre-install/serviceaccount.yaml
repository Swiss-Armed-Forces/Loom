apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "app.fullname" . }}-pre-install
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "") | nindent 4 }}
  {{- with include "app.annotations.custom" (dict "context" . "component" "") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}