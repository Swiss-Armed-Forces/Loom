apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "app.fullname" . }}-pre-install
  labels:
    {{- include "app.labels.custom" (dict "context" $ "component" "") | nindent 4 }}
    app.kubernetes.io/component: pre-install
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]