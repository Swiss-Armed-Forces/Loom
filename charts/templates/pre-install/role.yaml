apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "app.fullname" . }}-pre-install
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "preInstall") | nindent 4 }}
    app.kubernetes.io/component: pre-install
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "-5"
    {{- include "app.annotations.custom" (dict "context" . "component" "preInstall") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
