apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-elasticvue
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "elasticvue") | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
  {{- with include "app.annotations.custom" (dict "context" . "component" "elasticvue") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.elasticvue.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-elasticvue
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-elasticvue
        {{- include "app.labels.custom" (dict "context" . "component" "elasticvue") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "elasticvue") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.elasticvue.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with include "app.trustedCerts.initContainer" . }}
      initContainers:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: elasticvue
          image: {{ .Values.image.registry }}/{{ .Values.elasticvue.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.elasticvue.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: elasticvue-config
              mountPath: /usr/share/nginx/html/api/default_clusters.json
              readOnly: true
              subPath: default_clusters.json
            {{- with include "app.trustedCerts.volumeMount" . }}{{ . | nindent 12 }}{{- end }}
          ports:
            - name: elasticvue
              containerPort: {{ .Values.elasticvue.service.port }}
          {{- if .Values.elasticvue.resources }}
          resources: {{- toYaml .Values.elasticvue.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: elasticvue-config
          configMap:
            name:  {{ include "app.fullname" . }}-elasticvue-config
        {{- with include "app.trustedCerts.volumes" . }}{{ . | nindent 8 }}{{- end }}
