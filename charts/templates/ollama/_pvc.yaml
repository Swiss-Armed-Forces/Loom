{{- define "app.ollama.pvc" -}}
{{- $component := .component -}}
{{- $values := index .Values $component -}}
{{- if and $values.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "app.fullname" . }}-{{ $component }}-ollama-models
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "${component}") | nindent 4 }}
    app.kubernetes.io/component: "{{ $component }}"
  {{- with include "app.annotations.custom" (dict "context" . "component" $component) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ $values.pvc.accessModes | default "ReadWriteMany" | quote }}
  resources:
    requests:
      storage: {{ $values.pvc.storage }}
  {{- if $values.pvc.storageClass }}
  storageClassName: {{ $values.pvc.storageClass }}
  {{- end }}
{{- end }}
{{- end -}}
