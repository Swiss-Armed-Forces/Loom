{{- if .Values.fluentd.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "app.fullname" . }}-fluentd
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "fluentd") | nindent 4 }}
    app.kubernetes.io/component: monitoring
  {{- with include "app.annotations.custom" (dict "context" . "component" "fluentd") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "app.fullname" . }}-fluentd
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name: fluentd
{{- end }}
