apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-gotenberg
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "gotenberg") | nindent 4 }}
    app.kubernetes.io/component: gotenberg
  {{- with include "app.annotations.custom" (dict "context" . "component" "gotenberg") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.gotenberg.hpa.enabled }}
  replicas: {{ .Values.gotenberg.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.gotenberg.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.gotenberg.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-gotenberg
  template:
    metadata:
      labels:
        net: partially_fenced
        app: {{ include "app.name" . }}-gotenberg
        {{- include "app.labels.custom" (dict "context" . "component" "gotenberg") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "gotenberg") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.gotenberg.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with include "app.trustedCerts.initContainer" . }}
      initContainers:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: gotenberg
          image: {{ .Values.image.registry }}/{{ .Values.gotenberg.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.gotenberg.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
          {{- if and .Values.gotenberg.resources .Values.gotenberg.resources.limits .Values.gotenberg.resources.limits.memory }}
            - name: GOMEMLIMIT
              value: "{{ include "gomemlimit" (dict "memory" .Values.gotenberg.resources.limits.memory "factor" .Values.gotenberg.goMemoryLimitFactor) }}"
          {{- end }}
            # Gotenberg hardening variables
            - name: CHROMIUM_DENY_PUBLIC_IPS
              value: "true"
            # Currently we still need to access roundcube
            - name: CHROMIUM_DENY_PRIVATE_IPS
              value: "false"
            - name: WEBHOOK_DENY_PUBLIC_IPS
              value: "true"
            - name: WEBHOOK_DENY_PRIVATE_IPS
              value: "true"
            - name: LIBREOFFICE_DENY_PUBLIC_IPS
              value: "true"
            - name: LIBREOFFICE_DENY_PRIVATE_IPS
              value: "true"
            - name: API_DOWNLOAD_FROM_DENY_PUBLIC_IPS
              value: "true"
            - name: API_DOWNLOAD_FROM_DENY_PRIVATE_IPS
              value: "true"
            # Currently Javascript is still needed for email rendering
            - name: CHROMIUM_DISABLE_JAVASCRIPT
              value: "false"
            # Switch to enable debug route (curl --request GET http://localhost:3000/debug)
            - name: API_ENABLE_DEBUG_ROUTE
              value: "false"
          ports:
            - name: gotenberg
              containerPort: {{ .Values.gotenberg.service.port }}
          {{- if .Values.gotenberg.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gotenberg.service.port }}
            initialDelaySeconds: {{ default 0 .Values.gotenberg.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 20 .Values.gotenberg.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.gotenberg.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 .Values.gotenberg.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.gotenberg.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gotenberg.service.port }}
            initialDelaySeconds: {{ default 0 .Values.gotenberg.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 20 .Values.gotenberg.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.gotenberg.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 6 .Values.gotenberg.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.gotenberg.resources }}
          resources: {{- toYaml .Values.gotenberg.resources | nindent 12 }}
          {{- end }}
          {{- with include "app.trustedCerts.volumeMount" . }}
          volumeMounts:
            {{- . | nindent 12 }}
          {{- end }}
      {{- with include "app.trustedCerts.volumes" . }}
      volumes:
        {{- . | nindent 8 }}
      {{- end }}
