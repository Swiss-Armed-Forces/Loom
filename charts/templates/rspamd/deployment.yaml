apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-rspamd
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "rspamd") | nindent 4 }}
    app.kubernetes.io/component: rspamd
  {{- with include "app.annotations.custom" (dict "context" . "component" "rspamd") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.rspamd.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-rspamd
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-rspamd
        {{- include "app.labels.custom" (dict "context" . "component" "rspamd") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "rspamd") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.rspamd.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      # Disable DNS for pod:
      # Rspamd will lookup spam lists using
      # DNS, and this is really not something
      # we want to do here (possible data-leak).
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
        searches: []
        options: []
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with include "app.trustedCerts.initContainer" . }}
      initContainers:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: rspamd
          image: {{ .Values.image.registry }}/{{ .Values.rspamd.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.rspamd.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: worker
              containerPort: {{ .Values.rspamd.worker.service.port }}
            - name: controller
              containerPort: {{ .Values.rspamd.controller.service.port }}
          {{- if .Values.rspamd.resources }}
          resources: {{- toYaml .Values.rspamd.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: rspamd-config
              mountPath: /etc/rspamd/local.d/worker-normal.inc
              subPath: worker-normal.inc
            - name: rspamd-config
              mountPath: /etc/rspamd/local.d/worker-controller.inc
              subPath: worker-controller.inc
            - name: rspamd-config
              mountPath: /etc/rspamd/local.d/hfilter.conf
              subPath: hfilter.conf
            {{- with include "app.trustedCerts.volumeMount" . }}{{ . | nindent 12 }}{{- end }}
      volumes:
        - name: rspamd-config
          configMap:
            name: {{ include "app.fullname" . }}-rspamd-config
        {{- with include "app.trustedCerts.volumes" . }}{{ . | nindent 8 }}{{- end }}
