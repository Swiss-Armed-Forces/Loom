apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-frontend
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "frontend") | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with include "app.annotations.custom" (dict "context" . "component" "frontend") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - port: {{ .Values.frontend.service.port }}
      name: frontend
      targetPort: {{ .Values.frontend.service.port }}
  selector:
    app: {{ include "app.name" . }}-frontend
