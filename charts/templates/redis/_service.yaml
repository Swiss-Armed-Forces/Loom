{{- define "app.redis.service" -}}
{{- $component := .component -}}
{{- $values := index .Values $component -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-{{ $component }}
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" $component) | nindent 4 }}
    app.kubernetes.io/component: "{{ $component }}"
spec:
  ports:
    - port: {{ $values.service.port }}
      name: {{ $component }}
      targetPort: {{ $values.service.port }}
    {{- if $values.exporter }}
    {{- if $values.exporter.enabled }}
    - port: {{ $values.exporter.port }}
      name: metrics
      targetPort: {{ $values.exporter.port }}
    {{- end }}
    {{- end }}
  selector:
    app: {{ include "app.name" . }}-{{ $component }}
{{- end -}}
