{{- if .Values.kubeStateMetrics.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-kube-state-metrics
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "kubeStateMetrics") | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  replicas: {{ .Values.kubeStateMetrics.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-kube-state-metrics
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-kube-state-metrics
        {{- include "app.labels.custom" (dict "context" . "component" "kubeStateMetrics") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "app.fullname" . }}-kube-state-metrics
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: kube-state-metrics
          image: {{ .Values.image.registry }}/{{ .Values.kubeStateMetrics.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.kubeStateMetrics.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port={{ .Values.kubeStateMetrics.service.port }}
            - --telemetry-port={{ .Values.kubeStateMetrics.service.telemetryPort }}
          ports:
            - name: http-metrics
              containerPort: {{ .Values.kubeStateMetrics.service.port }}
            - name: telemetry
              containerPort: {{ .Values.kubeStateMetrics.service.telemetryPort }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if .Values.kubeStateMetrics.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http-metrics
            initialDelaySeconds: {{ default 5 .Values.kubeStateMetrics.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 10 .Values.kubeStateMetrics.livenessProbe.periodSeconds }}
            failureThreshold: {{ default 6 .Values.kubeStateMetrics.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.kubeStateMetrics.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: telemetry
            initialDelaySeconds: {{ default 5 .Values.kubeStateMetrics.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 10 .Values.kubeStateMetrics.readinessProbe.periodSeconds }}
            failureThreshold: {{ default 3 .Values.kubeStateMetrics.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.kubeStateMetrics.resources }}
          resources: {{- toYaml .Values.kubeStateMetrics.resources | nindent 12 }}
          {{- end }}
{{- end }}
