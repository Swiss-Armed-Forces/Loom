{{- if .Values.rabbit.ingress.amqp.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ include "app.fullname" . }}-rabbit-amqp
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "rabbit") | nindent 4 }}
    app.kubernetes.io/component: rabbit
  {{- with include "app.annotations.custom" (dict "context" . "component" "rabbit") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - amqp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: {{ include "app.fullname" . }}-rabbit
          port: {{ .Values.rabbit.service.port.amqp }}
{{- end }}