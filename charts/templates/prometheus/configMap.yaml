{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-prometheus-config
  labels:
     {{- include "app.labels.custom" (dict "context" . "component" "prometheus") | nindent 4 }}
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    scrape_configs:
      - job_name: 'rabbitmq-per-object'
        scrape_interval: 15s
        metrics_path: /metrics/per-object
        static_configs:
          - targets: ['{{ include "app.fullname" . }}-rabbit:{{ .Values.rabbit.service.port.prometheus }}']
      - job_name: 'api'
        scrape_interval: 15s
        metrics_path: /v1/metrics
        static_configs:
          - targets: ['{{ include "app.fullname" . }}-api:{{ .Values.api.service.port }}']
      - job_name: 'gotenberg'
        scrape_interval: 15s
        metrics_path: /prometheus/metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-gotenberg
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
      - job_name: 'seaweedfs-master'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-seaweedfs-master
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
      - job_name: 'seaweedfs-volume'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-seaweedfs-volume
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
      - job_name: 'seaweedfs-filer'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-seaweedfs-filer
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
{{- if .Values.translate.enabled }}
      - job_name: 'translate'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-translate
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
{{- end }}
{{- if .Values.mongodb.exporter.enabled }}
      - job_name: 'mongodb'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Only keep endpoints from the mongodb service
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-mongodb
          # Only keep the metrics port (not the mongodb port itself)
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          # Add pod name as a label for per-instance metrics
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          # Add service name for consistency with Redis
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
{{- end }}
{{- if .Values.elasticsearch.exporter.enabled }}
      - job_name: 'elasticsearch'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Only keep endpoints from the elasticsearch service
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-elasticsearch
          # Only keep the metrics port (not the elasticsearch port itself)
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          # Add pod name as a label for per-instance metrics
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          # Add service name for consistency
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
{{- end }}
{{- if .Values.redis.exporter.enabled }}
      - job_name: 'redis'
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Only keep endpoints from redis services (redis and redis-cache)
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ include "app.fullname" . }}-redis(-cache|-filer)?
          # Only keep the metrics port (not the redis port itself)
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          # Add pod name as a label for per-instance metrics
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          # Add service name to distinguish redis vs redis-cache
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
{{- end }}
{{- if .Values.kubeStateMetrics.enabled }}
      - job_name: 'kube-state-metrics'
        scrape_interval: 30s
        static_configs:
          - targets: ['{{ include "app.fullname" . }}-kube-state-metrics:{{ .Values.kubeStateMetrics.service.port }}']
        metric_relabel_configs:
          - action: keep
            source_labels: [namespace]
            regex: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.prometheus.collectClusterMetrics }}
      - job_name: 'cadvisor'
        scrape_interval: 30s
        scrape_timeout: 10s
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
        metric_relabel_configs:
          - action: keep
            source_labels: [namespace]
            regex: {{ .Release.Namespace }}
      - job_name: 'resource'
        scrape_interval: 30s
        scrape_timeout: 10s
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/resource
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
        metric_relabel_configs:
          - action: keep
            source_labels: [namespace]
            regex: {{ .Release.Namespace }}
{{- end }}
{{- end }}
