apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "app.fullname" . }}-elasticsearch
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "elasticsearch") | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
spec:
  serviceName: {{ include "app.fullname" . }}-elasticsearch
  # for cluster forming: must start all pods in parallel
  podManagementPolicy: Parallel
  replicas: {{ .Values.elasticsearch.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-elasticsearch
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}-elasticsearch
        {{- include "app.labels.custom" (dict "context" . "component" "elasticsearch") | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: elasticsearch
          image: {{ .Values.image.registry }}/{{ .Values.elasticsearch.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.elasticsearch.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: elasticsearch-config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              readOnly: true
              subPath: elasticsearch.yml
            - mountPath: /usr/share/elasticsearch/data
              name: elasticsearch-data
          ports:
            - name: http
              containerPort: {{ .Values.elasticsearch.service.port }}
            - name: readiness
              containerPort: 8081
          {{- if .Values.elasticsearch.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: readiness
            initialDelaySeconds: {{ default 10 .Values.elasticsearch.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 10 .Values.elasticsearch.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.elasticsearch.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 .Values.elasticsearch.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.elasticsearch.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: http
            initialDelaySeconds: {{ default 30 .Values.elasticsearch.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 15 .Values.elasticsearch.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.elasticsearch.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 5 .Values.elasticsearch.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.elasticsearch.resources }}
          resources:
            limits:
              cpu: {{ .Values.elasticsearch.resources.limits.cpu }}
              memory: {{ .Values.elasticsearch.resources.limits.memory }}
            requests:
              cpu: {{ .Values.elasticsearch.resources.requests.cpu }}
              memory: {{ .Values.elasticsearch.resources.requests.memory }}
          {{- end }}
        {{- if .Values.elasticsearch.exporter.enabled }}
        - name: elasticsearch-exporter
          image: {{ .Values.image.registry }}/{{ .Values.elasticsearch.exporter.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.elasticsearch.exporter.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--es.uri=http://127.0.0.1:{{ .Values.elasticsearch.service.port }}"
            - "--es.all"
            - "--es.indices"
            - "--es.shards"
          ports:
            - name: metrics
              containerPort: {{ .Values.elasticsearch.exporter.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.elasticsearch.exporter.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- end }}
      volumes:
        - name: elasticsearch-config
          configMap:
            name: {{ include "app.fullname" . }}-elasticsearch-config
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
          - {{ .Values.elasticsearch.pvc.accessModes | default "ReadWriteOnce" | quote }}
        resources:
            requests:
              storage: {{ .Values.elasticsearch.pvc.storage }}
        {{- if .Values.elasticsearch.pvc.storageClass }}
        storageClassName: {{ .Values.elasticsearch.pvc.storageClass }}
        {{- end }}
