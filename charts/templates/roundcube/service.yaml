apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-roundcube
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "roundcube") | nindent 4 }}
    app.kubernetes.io/component: roundcube
  {{- with include "app.annotations.custom" (dict "context" . "component" "roundcube") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - port: {{ .Values.roundcube.service.port }}
      name: roundcube
      targetPort: {{ .Values.roundcube.service.port }}
  selector:
    app: {{ include "app.name" . }}-roundcube
