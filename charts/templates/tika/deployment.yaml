apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-tika
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "tika") | nindent 4 }}
    app.kubernetes.io/component: tika
  {{- with include "app.annotations.custom" (dict "context" . "component" "tika") }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.tika.hpa.enabled }}
  replicas: {{ .Values.tika.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.tika.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.tika.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}-tika
  template:
    metadata:
      labels:
        net: fenced
        app: {{ include "app.name" . }}-tika
        {{- include "app.labels.custom" (dict "context" . "component" "tika") | nindent 8 }}
      {{- with include "app.annotations.custom" (dict "context" . "component" "tika") }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.tika.priorityClass }}
      priorityClassName: {{ include "app.fullname" $ }}-{{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with include "app.trustedCerts.initContainer" . }}
      initContainers:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: tika
          image: {{ .Values.image.registry }}/{{ .Values.tika.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.tika.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: tika
              containerPort: {{ .Values.tika.service.port }}
          startupProbe:
            httpGet:
              path: /tika
              port: {{ .Values.tika.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          {{- if .Values.tika.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /tika
              port: {{ .Values.tika.service.port }}
            initialDelaySeconds: {{ default 0 .Values.tika.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 20 .Values.tika.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.tika.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 .Values.tika.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.tika.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /tika
              port: {{ .Values.tika.service.port }}
            initialDelaySeconds: {{ default 0 .Values.tika.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 20 .Values.tika.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 5 .Values.tika.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 6 .Values.tika.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.tika.resources }}
          resources: {{- toYaml .Values.tika.resources | nindent 12 }}
          {{- end }}
          env:
            - name: TIKA_JAVA_OPS
              value: {{ .Values.tika.javaOpts | quote }}
          args:
            - "/bin/sh"
            - "-c"
            - >-
              exec java ${TIKA_JAVA_OPS}
              -cp "/tika-server-standard-${TIKA_VERSION}.jar:/tika-extras/*"
              org.apache.tika.server.core.TikaServerCli
              -h 0.0.0.0
              -c /tika-config/tika-config.xml
          volumeMounts:
            - name: imagemagick-policy
              mountPath: /etc/ImageMagick-7/policy.xml
              subPath: policy.xml
            - name: tika-config
              mountPath: /tika-config/tika-config.xml
              subPath: tika-config.xml
            - name: tmp
              mountPath: /tmp
            {{- with include "app.trustedCerts.volumeMount" . }}{{ . | nindent 12 }}{{- end }}
      volumes:
        - name: imagemagick-policy
          configMap:
            name: {{ include "app.fullname" . }}-imagemagick-policy
        - name: tika-config
          configMap:
            name: {{ include "app.fullname" . }}-tika-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.tika.tmpSizeLimit }}
        {{- with include "app.trustedCerts.volumes" . }}{{ . | nindent 8 }}{{- end }}
