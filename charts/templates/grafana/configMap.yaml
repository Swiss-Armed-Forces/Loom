apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-grafana
  labels:
    {{- include "app.labels.custom" (dict "context" . "component" "grafana") | nindent 4 }}
    app.kubernetes.io/component: monitoring
data:
  # see:
  # https://grafana.com/docs/grafana/latest/administration/provisioning/
  elasticsearch-logs.yml: |
    apiVersion: 1
    datasources:
      - name: Elasticsearch-Log
        type: elasticsearch
        uid: P61E7A9AD0246CD05
        isDefault: false
        access: proxy
        # Access mode - proxy (server in the UI) or direct (browser in the UI).
        url: http://{{ include "app.fullname" . }}-elasticsearch:{{ .Values.elasticsearch.service.port }}
        jsonData:
          index: ".ds-docker-logs-*"
          timeField: "@timestamp"
          logMessageField: log
  elasticsearch-file.yml: |
    apiVersion: 1
    datasources:
      - name: Elasticsearch-File
        type: elasticsearch
        uid: P512E5BC8A4C042E7
        isDefault: false
        access: proxy
        # Access mode - proxy (server in the UI) or direct (browser in the UI).
        url: http://{{ include "app.fullname" . }}-elasticsearch:{{ .Values.elasticsearch.service.port }}
        jsonData:
          index: "file"
          timeField: "uploaded_datetime"
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        isDefault: true
        access: proxy
        # Access mode - proxy (server in the UI) or direct (browser in the UI).
        url: http://{{ include "app.fullname" . }}-prometheus:{{ .Values.prometheus.service.port }}
        jsonData:
          httpMethod: POST
          manageAlerts: true
          prometheusType: Prometheus
          prometheusVersion: 2.51.2
          cacheLevel: "High"
          disableRecordingRules: false
          incrementalQueryOverlapWindow: 10m