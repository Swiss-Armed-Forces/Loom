# Multi-Node Deployment
#
# Use this when deploying Loom across multiple Kubernetes nodes and you need
# services to scale out under load, storage and search to remain available if a
# node goes down, and resource usage to stay within defined cluster boundaries.
#
# Tune the resourceQuotas.scalable.hard values to match your cluster's total
# allocatable resources minus the headroom needed for infrastructure pods.
#
worker:
  hpa:
    enabled: true

reaper:
  hpa:
    enabled: true

elasticsearch:
  replicaCount: 3
  shardsCount: 3
  shardsReplicasCount: 1
  config:
    cluster:
      routing:
        allocation:
          disk:
            threshold_enabled: true

translate:
  hpa:
    enabled: true

seaweedfs:
  master:
    defaultReplication: "010"
  volume:
    replicaCount: 3
  filer:
    hpa:
      enabled: true

ollama:
  hpa:
    enabled: true

prometheus:
  customLabels:
    pulse/enabled: true
  collectClusterMetrics: false

tika:
  hpa:
    enabled: true

gotenberg:
  hpa:
    enabled: true

resourceQuotas:
  scalable:
    enabled: true
    # Tune hard limits to match your cluster's total allocatable resources
    # minus the headroom needed for infrastructure pods.
    # Default assumes ~3 nodes with ~90 GiB / 24 cores total allocatable,
    # reserving ~20 GiB / 4 cores for infrastructure.
    hard:
      requests.cpu: "20"
      requests.memory: "70Gi"
      pods: "200"
