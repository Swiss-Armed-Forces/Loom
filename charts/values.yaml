  customLabels: {}
  customAnnotations: {}
  # Example:
  # monitoring-tier: "infrastructure"

# Extra environment variables injected into all pods via the settings ConfigMap.
# These are appended verbatim to the ConfigMap data and propagated to every pod
# that mounts it. Do NOT use this for sensitive values — use Kubernetes Secrets instead.
# Example:
#   extraEnv:
#     MY_CUSTOM_SETTING: "some-value"
#     FEATURE_FLAG_X: "true"
extraEnv: {}

# Trusted CA certificates to inject into all pods via an init container.
# Only rendered (ConfigMap + init container) when certs is non-empty, so
# deployments that don't require custom CAs incur no overhead.
# Example:
#   trustedCertificates:
#     certs:
#       - name: my-corporate-ca
#         data: |
#           -----BEGIN CERTIFICATE-----
#           ...
#           -----END CERTIFICATE-----
trustedCertificates:
  certs: []
  initContainer:
    image:
      repository: swiss-armed-forces/cyber-command/cea/loom/alpine
      tag: null
    resources:
      requests:
        cpu: "0.05"
        memory: "50Mi"
      limits:
        cpu: "0.1"
        memory: "100Mi"
