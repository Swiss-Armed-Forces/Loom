  # one env var that can be sourced from a Vault-backed K8s Secret instead of the
  # settings ConfigMap. Set enabled: true and fill in remoteRef to activate.
  # The key is the env var name injected into pods; name is the K8s Secret that
  # ESO will create; remoteRef.key is the path in the secret store (e.g. Vault),
  # remoteRef.property is the sub-key within that path.
  secrets:
    file_storage__access_key:
      enabled: false
      name: loom-file-storage-access-key
      remoteRef:
        key: ""
        property: ""
    file_storage__secret_key:
