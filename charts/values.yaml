  # labels to existing PVCs, delete and recreate the StatefulSet (PVCs are retained),
  # or label them manually with: kubectl label pvc <name> <key>=<value>
  customPvcLabels: {}
  # Custom annotations to add to all PVCs created from StatefulSet volumeClaimTemplates.
  customPvcAnnotations: {}

