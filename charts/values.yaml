environment: production
nameOverride: null

# Global configuration
global:
  # Custom labels to add to all resources
  customLabels: {}
  # Example:
  # environment: production
  # team: platform
  # cost-center: "12345"

domain: &default-domain loom

kubernetes:
  api: 192.168.49.2

image:
  registry: registry.gitlab.com
  pullPolicy: IfNotPresent

certificate:
  enabled: false
  issuerRef:
    name: null
  requireClientCert: false

ingress: &default-ingress-config
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  tls:
    enabled: true

egress:
  enabled: false

pipeline:
  taskTimeLimitSeconds: 86400  # 24h
  lazy_threshold_bytes: null
  uploaded_files_days_before_hidden: null
  imap_folder_days_before_unsubscribe: null
  skip_summarize_while_indexing: true
  skip_translate_while_indexing: true
  skip_embedding_while_indexing: false
  automatic_indexing: true
  tika_ocr_languages: null

llm:
  model: huihui_ai/qwen3.5-abliterated:9b
  model_embedding: nomic-embed-text-v2-moe
  model_tool: huihui_ai/qwen3.5-abliterated:9b
  temperature: null
  summarize_text_chunk_size: null
  summarize_text_chunk_overlap: null
  embedding_temperature: null
  embedding_text_chunk_size: null
  embedding_text_chunk_overlap: null
  rerank_temperature: null
  # HyDE (Hypothetical Document Embeddings) settings
  hyde_num_documents: null  # Number of hypothetical docs to generate
  hyde_temperature: null

preInstall:
  image:
    repository: swiss-armed-forces/cyber-command/cea/loom/alpine
  resources:
    requests:
      cpu: "0.1"
      memory: "100Mi"
    limits:
      cpu: "0.2"
      memory: "200Mi"
  generateSecret:
    - name: archive-enc-master-key
      size: 32
      chars: "a-f0-9"
      fixed: "00000000000000000000000000000000"

globalHttpRedirect:
  enabled: true
  image:
    repository: swiss-armed-forces/cyber-command/cea/loom/alpine
  service:
    port: 80
  resources:
    requests:
      cpu: "0.05"
      memory: "50Mi"
    limits:
      cpu: "0.1"
      memory: "100Mi"
  # Custom labels specific to globalHttpRedirect resources
  customLabels: {}
  # Example:
  # environment: production
  # team: infrastructure

