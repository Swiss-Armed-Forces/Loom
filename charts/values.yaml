# Priority classes for pod scheduling preemption.
# Infrastructure pods get higher priority so the scheduler evicts scalable pods
# (HPA-scaled workers) when quota is exhausted during redeployment.
# NOTE: PriorityClass is a cluster-scoped resource and requires cluster-level
# RBAC permissions to create. Set create: false if Helm lacks those permissions
# and create the PriorityClasses manually (or skip preemption entirely).
priorityClasses:
  create: true
  infrastructure:
    value: 1000
  scalable:
    value: -1000
  customLabels: {}
  customAnnotations: {}

# Priority-scoped ResourceQuotas to prevent scalable workloads from exhausting
# namespace quota and starving infrastructure StatefulSets during updates.
#
# How it works: Kubernetes ResourceQuota enforcement runs at admission time, before
# the scheduler's preemption logic. Even infrastructure-priority pods are rejected
# at admission if the namespace quota is full. Scoping a quota to the scalable
# priority class caps scalable pods separately, reserving headroom for infrastructure.
#
# Usage: Enable and set `hard` limits below (namespace quota) - (infrastructure requests).
# Example: if namespace quota is 32 CPU and infrastructure uses ~12 CPU, set
# requests.cpu to "20" to leave 12 CPU guaranteed for infrastructure.
resourceQuotas:
  customLabels: {}
  customAnnotations: {}
  scalable:
    enabled: false
    hard:
      requests.cpu: "20"
      requests.memory: "70Gi"
      pods: "200"

