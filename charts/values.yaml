redis: &redis
  replicaCount: 1
  priorityClass: infrastructure
  image:
    repository: swiss-armed-forces/cyber-command/cea/loom/redis
  service:
    port: 6379
  pvc:
    # Direct PVC storage size override (e.g. "8Gi"). When set, storageMultiplier is ignored.
    # When null, size is computed from memory limit * storageMultiplier.
    storage: null
    # Multiplier for PVC storage size relative to memory limit.
    # PVC size = memory limit * storageMultiplier
    storageMultiplier: 5
    storageClass: null
    customLabels: {}
    customAnnotations: {}
  # Percentage of memory limit to use for Redis maxmemory setting.
  # This reserves headroom for Redis overhead and fragmentation
  memoryLimitThresholdPercent: 0.6
