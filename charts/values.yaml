  # app-tier: ml
  # service-type: translation

seaweedfs:
  # SeaweedFS is a distributed storage system for blobs, objects, files, and data lake
  # It provides S3-compatible API through the filer component

  # Factor to multiply memory limit by for GOMEMLIMIT (0.0-1.0)
  # Default 0.9 leaves 10% headroom for non-Go memory usage
  goMemoryLimitFactor: 0.9

  master:
    replicaCount: 1
    image:
      repository: swiss-armed-forces/cyber-command/cea/loom/seaweedfs
    port: 9333
    grpcPort: 19333
    metricsPort: 9327
    # Replication format: xyz where x=datacenter, y=rack, z=server replicas
    #
    # REPLICATION CODES:
    # - "000": No replication (single copy)
    # - "001": 1 replica same rack (single-node default)
    # - "010": 1 replica different rack
    # - "011": 1 replica different rack + 1 same rack (multi-node recommended)
    #
    defaultReplication: "001"
    # Maximum size of each volume in MB. Smaller volumes = more volumes,
    # better replication distribution, faster garbage collection.
    # Default: 1024 (1GB). SeaweedFS default is 30000 (30GB).
    volumeSizeLimitMB: 1024
    volumeGrowth:
      copy_1: 4
      copy_2: 2
      copy_3: 2
      copy_other: 1
    pvc:
      storage: 1Gi
      storageClass: null
    resources:
      requests:
        cpu: "0.1"
        memory: "256Mi"
      limits:
        cpu: "0.5"
        memory: "512Mi"

  volume:
    replicaCount: 2
    # Multiplier for volumeSizeLimitMB to reserve space for compaction.
    # Volume compaction requires free disk space approximately equal to the volume being compacted.
    # With multiplier 2 and volumeSizeLimitMB 1024, reserves 2048MB (2GB) for compaction.
    minFreeSpaceMultiplier: 2
    image:
      repository: swiss-armed-forces/cyber-command/cea/loom/seaweedfs
    port: 8080
    grpcPort: 18080
    metricsPort: 9328
    pvc:
      storage: 20Gi
      storageClass: null
    resources:
      requests:
        cpu: "0.05"
        memory: "256Mi"
      limits:
        cpu: "0.5"
        memory: "1.5Gi"

  filer:
    replicaCount: 1
    # Graceful shutdown configuration for S3 multipart uploads
    terminationGracePeriodSeconds: 180
    preStopSleepSeconds: 5
    hpa:
      enabled: true
      maxReplicas: 5
      minReplicas: 1
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      scaleDown:
        stabilizationWindowSeconds: 300
        maxPodsPerMinute: 1
    image:
      repository: swiss-armed-forces/cyber-command/cea/loom/seaweedfs
    port: 8888
    grpcPort: 18888
    metricsPort: 9329
    resources:
      requests:
        cpu: "0.1"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

  s3:
    port: 8333
    ingress: *default-ingress-config

  admin:
    enabled: true
    port: 23646
    image:
      repository: swiss-armed-forces/cyber-command/cea/loom/seaweedfs
    resources:
      requests:
        cpu: "0.05"
        memory: "64Mi"
      limits:
        cpu: "0.2"
        memory: "256Mi"
    ingress: *default-ingress-config

  initContainer:
    image:
      repository: swiss-armed-forces/cyber-command/cea/loom/alpine
    resources:
      requests:
        cpu: "0.05"
        memory: "50Mi"
      limits:
        cpu: "0.1"
        memory: "100Mi"

  # Filer Metadata Backup to SQLite
  # Backs up filer metadata to a local SQLite database for disaster recovery
  filerMetaBackup:
    enabled: true
    filerDir: "/"
    pvc:
      # Multiplier for PVC storage size relative to redis-filer memory limit.
      # PVC size = redis-filer memory limit * storageMultiplier
      # This ensures enough space to store all metadata that could fit in Redis + headroom.
      storageMultiplier: 2
      storageClass: null
    # SQLite filer sidecar for restore operations
    sqliteFiler:
      port: 18889
      grpcPort: 28889
    resources:
      requests:
        cpu: "0.05"
        memory: "64Mi"
      limits:
        cpu: "0.2"
        memory: "256Mi"

  # Custom labels specific to seaweedfs resources
  customLabels: {}
  # Example:
  # datastore-type: object
  # persistence: required

