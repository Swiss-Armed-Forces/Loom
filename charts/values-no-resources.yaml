# No Resource Requests or Limits
#
# Use this when resource requests are causing scheduling issues or limits are
# causing OOM kills or CPU throttling and you want containers to burst freely.
# Note that without requests, the Kubernetes scheduler has no resource
# information to base placement decisions on. Without limits, a single runaway
# container can starve other workloads on the same node.
#
# For single-node deployments, copy this file's contents into
# charts/values-overwrites.yaml to apply it via Skaffold.
#
esInit:
  resources:
    requests: null
    limits: null
  initContainer:
    resources:
      requests: null
      limits: null

