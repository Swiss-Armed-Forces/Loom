# Development Mode
#
# Use this when actively developing Loom locally. It trades model quality and
# production-like behaviour for fast iteration: lightweight models reduce resource
# usage, hot reload means code changes take effect without pod restarts, and all
# internal services are reachable via ingress for direct inspection and debugging.
#
# Not suitable for production use.
#
environment: development

llm:
  embedding:
    text_chunk_size: 250
    text_chunk_overlap: 25

  tool:
    # Warning! This model is not intelligent enough to understand how tools work
    model: smollm2:135m

  summarization_key_points:
    model: smollm2:135m
    text_chunk_size: 1000
    text_chunk_overlap: 33

  summarization:
    model: smollm2:135m

  summarization_refine:
    model: smollm2:135m

  hyde:
    model: smollm2:135m
    num_documents: 1

  rerank:
    model: smollm2:135m
    temperature: 0

  chat:
    model: smollm2:135m

  vision:
    model: moondream:1.8b

ingress: &default-ingress-config
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure

globalHttpRedirect:
  enabled: false

api:
  ingress: *default-ingress-config
  # yamllint disable rule:indentation
  command: [
    "python", "-Xfrozen_modules=off",
    "-m", "debugpy",
      "--listen", "127.0.0.1:4401",
    "-m", "uvicorn", "main:app",
      "--workers", "1",
      "--log-level", "debug",
      "--port", "8084",
      "--host", "0.0.0.0",
      "--reload",
      "--reload-dir", "/code/common",
      "--reload-dir", "/code/api"
  ]
  # yamllint enable rule:indentation

frontend:
  ingress: *default-ingress-config
  # The dev-Server needs a bit more resources
  resources:
    requests:
      cpu: "0.1"
      memory: "1Gi"
    limits:
      cpu: "0.5"
      memory: "2Gi"

worker:
  # yamllint disable rule:indentation
  command: [
    "python", "-Xfrozen_modules=off",
    "-m", "debugpy",
      "--listen", "127.0.0.1:5500",
    "-m", "watchdog.watchmedo",
      "auto-restart",
      "--verbose",
      "--recursive",
      "--signal", "SIGTERM",
      "--patterns", "*.py",
      "--directory", "/code/common",
      "--directory", "/code/worker",
      "--debounce-interval", "3",
    "--",
    "python", "-Xfrozen_modules=off",
    "main.py",
      "worker",
      "--loglevel", "DEBUG"
  ]
  # yamllint enable rule:indentation

