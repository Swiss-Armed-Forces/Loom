description:
  en:
    localisedName: Loom
    shortDescription: Loom is a powerful, easily deployable open-source document
      search engine for secure, task-specific deployments.
    longDescription: Loom is a powerful, easily deployable open-source document
      search engine designed for secure, task-specific deployments 🚀. It automates
      indexing of data sources, performs OCR, extracts content and metadata, and
      enables powerful full-text search enriched by AI features such as RAG chat,
      auto-tagging, summarization, and translation 🤖🌍. Loom handles a vast array
      of file formats including Office documents, PDFs, emails, archives, and images 📚.
      It provides secure rendered document previews and thumbnails 🖼️, archive
      creation from search results 📦, custom tagging 📌, and a comprehensive
      REST API for integration into existing workflows 🔗.
    documentation: https://gitlab.com/swiss-armed-forces/cyber-command/cea/loom/-/blob/main/README.md
    features:
      - Simple Deployment
      - Powerful Search
      - Automatic Indexing
      - Flexible Data Ingestion
      - Comprehensive Content Extraction
      - Metadata Extraction
      - AI Features (RAG chat, auto-tagging, summarization)
      - Secure Document Rendering and Thumbnails
      - Archive Creation
      - Tagging
      - Translation
      - REST API
